<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nepal Health Hospital</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .auth-card {
            background-color: var(--surface);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-standard);
            overflow: hidden;
        }
        .auth-header {
            background-color: var(--background);
            padding: var(--space-6);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .auth-header img {
            max-width: 120px;
            margin-bottom: var(--space-3);
        }
        .auth-header h2 {
            margin-bottom: var(--space-2);
            color: var(--primary);
        }
        .auth-body {
            padding: var(--space-6);
        }
        .form-group {
            margin-bottom: var(--space-4);
        }
        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 500;
        }
        .input-group {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }
        .input-group input {
            flex: 1;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            padding: 0 var(--space-4);
            position: relative;
        }
        .step-indicator::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #E5E7EB; /* gray-200 */
            z-index: -1;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .step-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #E5E7EB; /* gray-200 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: var(--body-sm);
            margin-bottom: var(--space-2);
        }
        .step.active .step-circle {
            background-color: var(--primary);
            color: var(--surface);
        }
        .step.completed .step-circle {
            background-color: var(--success);
            color: var(--surface);
        }
        .step-label {
            font-size: var(--body-sm);
            text-align: center;
            width: 80px;
        }
        .or-divider {
            display: flex;
            align-items: center;
            margin: var(--space-4) 0;
            color: var(--text-body);
        }
        .or-divider::before,
        .or-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .or-divider span {
            padding: 0 var(--space-3);
        }
        .terms-checkbox {
            display: flex;
            align-items: start;
            margin: var(--space-4) 0;
        }
        .terms-checkbox input {
            margin-top: 4px;
        }
        .terms-checkbox label {
            flex: 1;
            line-height: 1.4;
        }
        .terms-checkbox a {
            color: var(--primary);
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: var(--space-4);
            color: var(--text-body);
            font-size: var(--body-sm);
        }
        .footer-text a {
            color: var(--primary);
            text-decoration: underline;
        }
        .password-requirements {
            margin-top: var(--space-2);
            padding: var(--space-3);
            background-color: var(--background);
            border-radius: var(--radius-card);
            font-size: var(--body-sm);
        }
        .requirement-item {
            display: flex;
            align-items: start;
            margin-top: var(--space-2);
        }
        .requirement-icon {
            margin-top: 2px;
            margin-right: var(--space-2);
            min-width: 20px;
        }
        .requirement-text {
            flex: 1;
        }
        .requirement-item.completed .requirement-icon {
            color: var(--success);
        }
        .requirement-item.completed .requirement-text {
            text-decoration: line-through;
            color: #6B7280; /* gray-500 */
        }
    </style>
</head>
